title: Ideas
labels: [ideas]
body:
  - type: textarea
    id: summary
    attributes:
      label: Idea summary
      description: What would you like to see in Vibeflow n8n?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
  - type: textarea
    id: sketch
    attributes:
      label: Proposed approach
      description: Share a rough implementation idea or usage example.
